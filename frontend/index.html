<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MarketLens — Daily Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#06090f; --ink2:#0c1018; --ink3:#141a24;
  --gold:#c9a84c; --gold2:#e8c96a; --gold3:#f5dfa0; --gold-dim:#6b5020; --gold-bg:rgba(201,168,76,.08); --gold-glow:rgba(201,168,76,.18);
  --silver:#8a95aa; --silver2:#50596b; --white:#e8ecf5;
  --green:#1ecb96; --gbg:rgba(30,203,150,.08); --gbd:rgba(30,203,150,.28);
  --red:#f0607a; --rbg:rgba(240,96,122,.08); --rbd:rgba(240,96,122,.28);
  --amber:#e8a020; --abg:rgba(232,160,32,.08); --abd:rgba(232,160,32,.28);
  --blue:#4d8ef0; --bbg:rgba(77,142,240,.08); --bbd:rgba(77,142,240,.28);
  --purple:#9b7ff5; --pbg:rgba(155,127,245,.08);
  --border:rgba(201,168,76,.09); --border2:rgba(201,168,76,.22);
  --card-bg:rgba(10,14,22,.8);
  --r:16px; --r2:11px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'JetBrains Mono',monospace;background:var(--ink);color:var(--white);font-size:13px;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
.serif{font-family:'JetBrains Mono',monospace}

/* Background */
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(201,168,76,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.012) 1px,transparent 1px);
  background-size:72px 72px}
.bg-glow1{position:fixed;top:-25%;left:-15%;width:65%;height:75%;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse,rgba(201,168,76,.055) 0%,transparent 60%)}
.bg-glow2{position:fixed;bottom:-25%;right:-15%;width:60%;height:70%;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse,rgba(77,142,240,.035) 0%,transparent 60%)}
.shell{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Top bar */
.topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:62px;border-bottom:1px solid var(--border);
  background:rgba(6,9,15,.94);backdrop-filter:blur(24px)}
.brand{display:flex;align-items:center;gap:14px}
.brand-logo{width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,rgba(201,168,76,.18),rgba(201,168,76,.05));
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.brand-text{display:flex;flex-direction:column;gap:1px}
.brand-name{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:800;letter-spacing:.06em;
  background:linear-gradient(135deg,var(--gold3) 0%,var(--gold2) 50%,var(--gold) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;text-transform:uppercase}
.brand-sub{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--silver2);letter-spacing:.32em;line-height:1;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:12px}
.pill{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;font-weight:500}
.pg{border:1px solid var(--gbd);background:var(--gbg);color:var(--green)}
.pa{border:1px solid var(--abd);background:var(--abg);color:var(--amber)}
.dot{width:5px;height:5px;border-radius:50%;animation:blink 2.2s infinite;flex-shrink:0}
.dg{background:var(--green)}.da{background:var(--amber)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#clock{font-size:10px;color:var(--silver2);letter-spacing:.04em}
.rbtn{display:flex;align-items:center;gap:5px;padding:7px 16px;border-radius:9px;
  background:var(--gold-bg);border:1px solid var(--border2);color:var(--gold2);
  font-family:'JetBrains Mono',monospace;font-size:8px;cursor:pointer;letter-spacing:.12em;
  transition:all .15s}
.rbtn:hover{background:rgba(201,168,76,.16);border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.1)}
.rbtn:active{transform:scale(.96)}

/* Ticker strip */
.tstrip{flex:0 0 auto;overflow:hidden;border-bottom:1px solid var(--border);background:rgba(10,14,22,.6)}
.ttrack{display:flex;width:max-content;animation:tscroll 80s linear infinite}
.ttrack:hover{animation-play-state:paused}
.ti{display:flex;align-items:center;gap:10px;padding:10px 24px;border-right:1px solid var(--border);white-space:nowrap}
.ti-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.ts{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold);font-weight:500;letter-spacing:.1em}
.tv{font-size:12px;color:var(--white);font-weight:500}
.tc{font-size:8px;padding:2px 7px;border-radius:4px;font-weight:500;letter-spacing:.04em}
.up{color:var(--green)}.dn{color:var(--red)}.nt{color:var(--silver)}
.tc.up{background:var(--gbg);color:var(--green)}.tc.dn{background:var(--rbg);color:var(--red)}
@keyframes tscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.body-row{flex:1 1 0;display:flex;overflow:hidden;min-height:0}

/* Sidebar */
.sidebar{flex:0 0 228px;display:flex;flex-direction:column;overflow:hidden;
  border-right:1px solid var(--border);background:rgba(6,9,15,.65);backdrop-filter:blur(12px)}
.sidebar-nav{flex:0 0 auto;padding:16px 12px 10px}
.ngl{display:block;font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--silver2);
  letter-spacing:.28em;text-transform:uppercase;padding:4px 8px 10px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;
  cursor:pointer;color:var(--silver);font-size:12px;transition:all .12s;
  border:1px solid transparent;user-select:none;line-height:1.3;margin-bottom:2px;
  font-family:'Plus Jakarta Sans',sans-serif;font-weight:400}
.ni:hover{background:rgba(255,255,255,.04);color:var(--white);border-color:var(--border)}
.ni.active{background:var(--gold-bg);color:var(--gold2);border-color:var(--border2)}
.ni .n{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--silver2);min-width:22px;flex-shrink:0;letter-spacing:.04em}
.ni.active .n{color:var(--gold)}
.ndiv{height:1px;background:var(--border);margin:10px 12px}
.sidebar-hist{flex:1 1 0;overflow-y:auto;padding:0 12px 20px;min-height:0}
.hi{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;
  cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:2px}
.hi:hover{background:rgba(255,255,255,.04)}
.hi.active{background:var(--gold-bg);border-color:var(--border)}
.hdot{width:5px;height:5px;border-radius:50%;background:var(--gold-dim);flex-shrink:0;margin-top:1px}
.hi.active .hdot{background:var(--gold)}
.hdate{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--white)}
.hmeta{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--silver2);margin-top:2px}

/* Main */
.main{flex:1 1 0;overflow-y:auto;overflow-x:hidden;padding:24px 26px 80px;scroll-behavior:smooth}
.section{margin-bottom:20px;scroll-margin-top:24px}

/* Cards */
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;backdrop-filter:blur(14px);
  border-top:1px solid rgba(201,168,76,.14);
  box-shadow:0 6px 32px rgba(0,0,0,.28),0 1px 0 rgba(255,255,255,.025) inset}
.ch{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 14px;
  border-bottom:1px solid var(--border)}
.ct{font-family:'Instrument Serif',serif;font-size:17px;font-weight:400;color:var(--white);
  display:flex;align-items:center;gap:11px;letter-spacing:-.01em}
.ci{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold-bg),rgba(201,168,76,.03));
  border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.cb{padding:22px}
.chr{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.badge{font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 10px;
  border-radius:5px;letter-spacing:.08em;font-weight:500}
.bg2{color:var(--gold);border:1px solid var(--border2);background:var(--gold-bg)}
.bgg{color:var(--green);background:var(--gbg);border:1px solid var(--gbd)}
.bgr{color:var(--red);background:var(--rbg);border:1px solid var(--rbd)}
.bga{color:var(--amber);background:var(--abg);border:1px solid var(--abd)}
.bgb{color:var(--blue);background:var(--bbg);border:1px solid var(--bbd)}
.bgp{color:var(--purple);background:var(--pbg);border:1px solid rgba(155,127,245,.3)}

/* INDEX TILES — hero treatment */
.idx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:18px}
.idx-tile{background:linear-gradient(160deg,rgba(201,168,76,.06) 0%,rgba(255,255,255,.012) 60%);
  border:1px solid var(--border);border-top:1px solid rgba(201,168,76,.18);border-radius:var(--r2);padding:20px 20px 16px;
  transition:all .22s;position:relative;overflow:hidden}
.idx-tile:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.35)}
.idx-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--silver2);letter-spacing:.16em;margin-bottom:10px;text-transform:uppercase}
.idx-val{font-family:'Instrument Serif',serif;font-size:36px;font-weight:400;color:var(--white);line-height:1;margin-bottom:6px;letter-spacing:-.02em}
.idx-chg{font-size:10.5px;margin-bottom:14px;font-weight:500;letter-spacing:.02em}
.rbar{position:relative;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:visible;margin-bottom:6px}
.rfill{position:absolute;top:0;left:0;height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold-dim),var(--gold2))}
.rmark{position:absolute;top:-5px;width:3px;height:13px;background:var(--white);border-radius:2px;box-shadow:0 0 8px rgba(201,168,76,.7)}
.rlbls{display:flex;justify-content:space-between;font-size:7.5px;color:var(--silver2);margin-top:3px}
.idx-note{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--silver2);margin-top:10px;letter-spacing:.02em;line-height:1.7}
.idx-note span{color:var(--silver)}
.pulse-box{margin-top:16px;padding:16px 20px;
  background:linear-gradient(135deg,rgba(201,168,76,.07) 0%,rgba(201,168,76,.02) 100%);
  border:1px solid var(--border2);border-radius:11px;
  font-size:13.5px;color:var(--silver);line-height:1.8;position:relative;overflow:hidden}
.pulse-box::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold2),var(--gold-dim))}
.pulse-box strong{color:var(--gold2);font-weight:600}

/* Watchlist table */
.wtbl-wrap{overflow-x:auto}
.wtbl{width:100%;border-collapse:collapse;min-width:640px}
.wtbl th{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--silver2);
  letter-spacing:.14em;text-transform:uppercase;padding:10px 12px;text-align:right;
  border-bottom:1px solid var(--border);font-weight:400;white-space:nowrap}
.wtbl th:first-child{text-align:left}
.wtbl td{padding:12px 12px;font-size:11.5px;color:var(--white);text-align:right;border-bottom:1px solid rgba(201,168,76,.04)}
.wtbl td:first-child{text-align:left}
.wtbl tbody tr{transition:background .1s}
.wtbl tbody tr:hover td{background:rgba(255,255,255,.022)}
.wsym{color:var(--gold2);font-weight:500;font-size:12.5px;font-family:'JetBrains Mono',monospace}
.wnm{color:var(--silver2);font-size:9px;font-family:'Plus Jakarta Sans',sans-serif;margin-top:2px}
.spark-cell{padding:12px 12px 12px 6px!important}
canvas.spark{display:block}

/* Raw section */
.raw-section{font-size:13px;color:var(--silver);line-height:1.8}
.raw-section table{width:100%;border-collapse:collapse;font-size:12px;margin:12px 0}
.raw-section th{background:var(--gold-bg);color:var(--gold2);padding:10px 12px;text-align:left;font-size:10px;border-bottom:1px solid var(--border2);font-weight:500;font-family:'JetBrains Mono',monospace;letter-spacing:.07em}
.raw-section td{padding:11px 12px;border-bottom:1px solid rgba(201,168,76,.05);color:var(--silver)}
.raw-section tr:hover td{background:rgba(255,255,255,.02)}
.raw-section p{margin-bottom:13px;font-size:13px;line-height:1.8}
.raw-section ul{padding-left:20px;margin-bottom:13px}
.raw-section li{margin-bottom:8px;font-size:13px;line-height:1.7}
.raw-section strong{color:var(--white);font-weight:600}
.raw-section h3{color:var(--gold2);font-family:'Instrument Serif',serif;font-size:17px;font-weight:400;margin:20px 0 11px}
.raw-section [style*="color:#1a7a3c"]{color:var(--green)!important}
.raw-section [style*="color:#c0392b"]{color:var(--red)!important}
.raw-section [style*="background:#0a3d62"]{background:var(--gold-bg)!important;color:var(--gold2)!important;border:none!important}
.raw-section [style*="background:#f8f9fa"]{background:rgba(255,255,255,.03)!important;border-left-color:var(--gold)!important}
.raw-section [style*="background:#c0392b"]{background:rgba(240,96,122,.14)!important;color:var(--red)!important;border-radius:6px}

/* Prose */
.prose p{font-size:13.5px;color:var(--silver);line-height:1.9;margin-bottom:15px}
.prose p:last-child{margin-bottom:0}
.prose strong{color:var(--white);font-weight:600}

/* Sectors */
.sec-wrap{display:grid;grid-template-columns:1fr 1fr;gap:30px}
.sec-col-lbl{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--silver2);letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px}
.sec-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.sec-name{font-size:12px;color:var(--silver);width:156px;flex-shrink:0}
.sec-track{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.sec-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.23,1,.32,1)}
.sec-fill.pos{background:linear-gradient(90deg,rgba(30,203,150,.35),var(--green))}
.sec-fill.neg{background:linear-gradient(90deg,rgba(240,96,122,.35),var(--red))}
.sec-pct{font-size:10.5px;width:52px;text-align:right;flex-shrink:0;font-weight:500}
.macro-row{display:flex;gap:14px;padding:11px 0;border-bottom:1px solid rgba(201,168,76,.05)}
.macro-tag{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--gold);min-width:54px;padding-top:2px;flex-shrink:0;letter-spacing:.07em}
.macro-desc{font-size:12px;color:var(--silver);line-height:1.7}

/* Sector chart canvas */
.sec-chart-wrap{margin-top:6px}

/* Earnings calendar */
.cal-lbl{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--silver2);letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px}
.cal-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid rgba(201,168,76,.05)}
.cal-tk{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--gold);min-width:58px;font-weight:500}
.cal-name{font-size:12.5px;color:var(--white);flex:1}
.cal-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--silver)}

/* STW cards */
.stw-list{display:flex;flex-direction:column;gap:12px}
.stw-card{display:flex;gap:18px;padding:18px 20px;
  background:linear-gradient(135deg,rgba(255,255,255,.025) 0%,rgba(255,255,255,.008) 100%);
  border:1px solid var(--border);border-radius:var(--r2);transition:all .2s;align-items:flex-start;position:relative;overflow:hidden}
.stw-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2px}
.stw-card.buy::after{background:linear-gradient(180deg,var(--green),rgba(30,203,150,.2))}
.stw-card.sell::after{background:linear-gradient(180deg,var(--red),rgba(240,96,122,.2))}
.stw-card.hold::after{background:linear-gradient(180deg,var(--amber),rgba(232,160,32,.2))}
.stw-card:hover{border-color:var(--border2);transform:translateX(4px);box-shadow:0 6px 28px rgba(0,0,0,.3)}
.stw-left{flex-shrink:0;text-align:center;width:76px}
.stw-ticker{font-size:18px;font-weight:600;color:var(--gold2);letter-spacing:-.01em}
.stw-price{font-size:10px;color:var(--silver2);margin-top:5px}
.stw-hz{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--silver2);letter-spacing:.07em;margin-top:8px;text-transform:uppercase;line-height:1.4}
.stw-body{flex:1}
.stw-name{font-size:13px;font-weight:600;color:var(--white);margin-bottom:7px}
.stw-reason{font-size:12px;color:var(--silver);line-height:1.75}

/* Market Trends */
.trends-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:4px}
.trend-col-lbl{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--silver2);letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.trend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.trend-item{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid rgba(201,168,76,.05)}
.trend-item:last-child{border-bottom:none}
.trend-icon{font-size:11px;flex-shrink:0;margin-top:2px}
.trend-text{font-size:12.5px;color:var(--silver);line-height:1.7}

/* Portfolio allocation */
.alloc-table{width:100%;border-collapse:collapse;margin-top:4px}
.alloc-table th{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--silver2);letter-spacing:.18em;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-weight:400}
.alloc-table td{padding:14px;border-bottom:1px solid rgba(201,168,76,.05);font-size:12.5px;color:var(--silver);vertical-align:top}
.alloc-table tbody tr:hover td{background:rgba(255,255,255,.02)}
.alloc-table tr:last-child td{border-bottom:none}
.alloc-bucket{color:var(--white);font-weight:600;font-size:13px;margin-bottom:3px}
.alloc-bar-wrap{margin-top:7px}
.alloc-bar{height:3px;border-radius:2px;background:linear-gradient(90deg,var(--gold-dim),var(--gold2));transition:width .7s cubic-bezier(.23,1,.32,1)}
.alloc-pct{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--gold2);font-weight:500;text-align:right;padding-right:8px}
.alloc-rationale{padding:15px 18px;background:rgba(201,168,76,.05);border:1px solid var(--border);border-radius:10px;margin-bottom:18px;font-size:13px;color:var(--silver);line-height:1.8;position:relative;overflow:hidden}
.alloc-rationale::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold2),var(--gold-dim))}
.alloc-trigger{margin-top:15px;padding:13px 16px;background:rgba(77,142,240,.07);border:1px solid rgba(77,142,240,.2);border-radius:9px;font-size:12.5px;color:var(--silver);line-height:1.65}
.alloc-trigger strong{color:var(--blue)}

/* Donut chart */
.alloc-top{display:flex;gap:24px;align-items:flex-start;margin-bottom:18px}
.alloc-donut-wrap{flex-shrink:0}
.alloc-legend{display:flex;flex-direction:column;gap:9px;justify-content:center;padding-top:4px}
.alloc-leg-row{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--silver)}
.alloc-leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.alloc-leg-name{flex:1}
.alloc-leg-pct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold2);font-weight:500}

/* States */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:16px;text-align:center;padding:40px}
.spin{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.st{font-family:'Instrument Serif',serif;font-size:20px;font-weight:400;color:var(--white)}
.ss{font-size:13px;color:var(--silver);line-height:1.8;max-width:380px}
.ss a{color:var(--gold)}

@media(max-width:960px){
  .sidebar{display:none}
  .sec-wrap,.trends-grid{grid-template-columns:1fr}
  .main{padding:16px 14px 60px}
  .alloc-top{flex-direction:column}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}

    </div>

  <div class="main" id="mainArea"></div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const FINNHUB_KEY = 'd80dkv9r01qq9ln3g0ugd80dkv9r01qq9ln3g0v0';
const TICK_SYMS   = ['NVDA','MSFT','AAPL','META','GOOGL','AMZN','TSLA','AMD','AVGO','MU','C','IONQ'];
const TICK_SPECIAL = {'SPY':'SPY','QQQ':'QQQ','VIX':'CBOE:VIX'};
const TAPE_ORDER   = ['SPY','QQQ',...TICK_SYMS,'VIX','SGT'];

const DONUT_COLORS = ['#c9a84c','#4d8ef0','#1ecb96','#f0607a','#9b7ff5','#e8a020','#50596b'];

(function buildTape(){
  const t = document.getElementById('ttrack');
  const cell = s => s==='SGT'
    ? `<div class="ti"><span class="ts">SGT</span><span class="tv" id="@SGT">—</span></div>`
    : `<div class="ti"><span class="ts">${s}</span><span class="tv" id="@${s}">—</span><span class="tc" id="#${s}">—</span></div>`;
  const mk = p => TAPE_ORDER.map(s=>cell(s).replace('@',p+'v').replace('#',p+'c')).join('');
  t.innerHTML = mk('A')+mk('B');
})();

function tick(){
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('en-SG',{weekday:'short',month:'short',day:'numeric'})+' · '+
    now.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit'});
  setTk('SGT',now.toLocaleTimeString('en-SG',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Singapore'}),null);
  const u=now.getUTCHours()*60+now.getUTCMinutes(), wd=now.getUTCDay(), we=wd===0||wd===6;
  let txt='AFTER CLOSE',cls='pg',dc='dg';
  if(!we){if(u>=750&&u<810){txt='PRE-MARKET';cls='pa';dc='da';}else if(u>=810&&u<1200){txt='MARKET OPEN';cls='pg';dc='dg';}}
  document.getElementById('sPill').className='pill '+cls;
  document.getElementById('sDot').className='dot '+dc;
  document.getElementById('sTxt').textContent=txt;
}
tick(); setInterval(tick,1000);

function setTk(sym,val,pct){
  ['Av','Bv'].forEach(p=>{const e=document.getElementById(p+sym);if(e)e.textContent=val??'—';});
  if(pct!==null)['Ac','Bc'].forEach(p=>{
    const e=document.getElementById(p+sym);
    if(e){e.textContent=(pct>0?'+':'')+pct.toFixed(2)+'%';e.className='tc '+(pct>0?'up':pct<0?'dn':'nt');}
  });
}

async function fetchTickers(){
  if(!FINNHUB_KEY) return;
  const delay=ms=>new Promise(r=>setTimeout(r,ms));
  const fmt=c=>c>=1000?c.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):c.toFixed(2);
  for(const sym of TICK_SYMS){
    try{const d=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_KEY}`).then(r=>r.json());if(d.c)setTk(sym,fmt(d.c),d.dp??0);}catch(e){}
    await delay(160);
  }
  for(const [lbl,fs] of Object.entries(TICK_SPECIAL)){
    try{const d=await fetch(`https://finnhub.io/api/v1/quote?symbol=${fs}&token=${FINNHUB_KEY}`).then(r=>r.json());if(d.c)setTk(lbl,fmt(d.c),d.dp??0);}catch(e){}
    await delay(160);
  }
}

function scrollTo2(id,el){
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
  const t=document.getElementById(id),m=document.getElementById('mainArea');
  if(t&&m)m.scrollTo({top:t.offsetTop-18,behavior:'smooth'});
}

const num=v=>{const n=parseFloat(String(v).replace(/[^0-9.\-+]/g,''));return isNaN(n)?null:n;};
function fmtPrice(v){const n=num(v);if(n===null)return v??'—';return n>=1000?n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):n.toFixed(2);}
function pct(v){
  if(v==null||v==='—'||/unavailable|N\/A/i.test(v))return '<span class="nt">—</span>';
  const n=num(v);if(n===null)return `<span class="nt">${v}</span>`;
  const s=String(v).includes('%')?v:(n>=0?'+':'')+n.toFixed(2)+'%';
  return `<span class="${n>=0?'up':'dn'}">${s}</span>`;
}
function rBadge(r){const m={BUY:'bgg',HOLD:'bga',SELL:'bgr'};return r?`<span class="badge ${m[r]||'bg2'}">${r}</span>`:'';}
function renderRaw(html){return html?`<div class="raw-section">${html}</div>`:'<p style="color:var(--silver2);font-size:12px">Not available.</p>';}

/* ── SPARKLINE (mini range bar using 52w lo/hi + current) ── */
function drawRangeSparkline(canvas, lo, hi, curr, dayChg){
  if(!canvas||lo===null||hi===null||curr===null||hi<=lo) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  const pad = 4;
  const pos = (curr - lo) / (hi - lo);
  const trackY = H/2;
  const color = (dayChg??0) >= 0 ? '#1ecb96' : '#f0607a';
  // track
  ctx.beginPath(); ctx.moveTo(pad,trackY); ctx.lineTo(W-pad,trackY);
  ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=2; ctx.stroke();
  // filled portion
  const fillX = pad + pos*(W-pad*2);
  ctx.beginPath(); ctx.moveTo(pad,trackY); ctx.lineTo(fillX,trackY);
  ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
  // marker
  ctx.beginPath(); ctx.arc(fillX,trackY,3.5,0,Math.PI*2);
  ctx.fillStyle=color; ctx.fill();
}

function renderMkt(rows,pulse){
  if(!rows?.length)return '<p style="color:var(--silver2);font-size:12px">Market data unavailable.</p>';
  const tiles=rows.map(r=>{
    const name=r.index??'—',price=fmtPrice(r.closing_price);
    const day=r.day_change,dN=num(day);
    const lo=num(r['52w_low']),hi=num(r['52w_high']),pr=num(r.closing_price);
    const isVix=String(name).toLowerCase().includes('vix');
    let pos=50;
    if(lo!==null&&hi!==null&&pr!==null&&hi>lo)pos=Math.max(2,Math.min(98,(pr-lo)/(hi-lo)*100));
    const dayCls=dN===null?'nt':dN>=0?'up':'dn';
    const arrow=dN===null?'':dN>=0?'▲':'▼';
    return `<div class="idx-tile">
      <div class="idx-lbl">${name}</div>
      <div class="idx-val">${price}</div>
      <div class="idx-chg ${dayCls}">${arrow} ${day??'—'} today</div>
      <div class="rbar"><div class="rfill" style="width:${pos}%"></div><div class="rmark" style="left:calc(${pos}% - 1px)"></div></div>
      <div class="rlbls"><span>${isVix?'Lo':'52W Lo'} ${r['52w_low']??'—'}</span><span>${isVix?'Hi':'52W Hi'} ${r['52w_high']??'—'}</span></div>
      <div class="idx-note"><span>${r['1_week']??'—'}</span> 1W · <span>${r['1_month']??'—'}</span> 1M · <span>${r['1_year']??'—'}</span> 1Y</div>
    </div>`;
  }).join('');
  const pb=pulse?`<div class="pulse-box"><strong>Pulse — </strong>${pulse}</div>`:'';
  return `<div class="idx-grid">${tiles}</div>${pb}`;
}

function renderWatch(rows){
  if(!rows?.length)return '<p style="color:var(--silver2);font-size:12px">Watchlist unavailable.</p>';
  const head=['Symbol','Price','Day','1 Wk','1 Mo','1 Yr','52W Range','Beta'].map(h=>`<th>${h}</th>`).join('');
  const body=rows.map((r,i)=>{
    const lo=num(r['52w_low']),hi=num(r['52w_high']),pr=num(r.price),dN=num(r.day_change);
    const cid=`spark-${i}`;
    const sparkCell=`<td class="spark-cell"><canvas id="${cid}" class="spark" width="72" height="22"></canvas></td>`;
    return `<tr>
      <td><div class="wsym">${r.ticker??'—'}</div><div class="wnm">${r.company??''}</div></td>
      <td class="nt">${fmtPrice(r.price)}</td>
      <td>${pct(r.day_change)}</td><td>${pct(r['1_week'])}</td><td>${pct(r['1_month'])}</td><td>${pct(r['1_year'])}</td>
      ${sparkCell}
      <td class="nt">${r.beta??'N/A'}</td>
    </tr>`;
  }).join('');
  setTimeout(()=>{
    rows.forEach((r,i)=>{
      const c=document.getElementById(`spark-${i}`);
      if(c) drawRangeSparkline(c,num(r['52w_low']),num(r['52w_high']),num(r.price),num(r.day_change));
    });
  },80);
  return `<div class="wtbl-wrap"><table class="wtbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

/* ── SECTOR CHART using Chart.js horizontal bar ── */
function renderSectors(winners,losers,macro){
  const all=[...(winners||[]).map(w=>({name:w.name,pct:num(w.pct)||0,pos:true})),
             ...(losers||[]).map(l=>({name:l.name,pct:num(l.pct)||0,pos:false}))];
  const sorted=[...all].sort((a,b)=>b.pct-a.pct);
  const labels=sorted.map(s=>s.name);
  const values=sorted.map(s=>s.pct);
  const colors=sorted.map(s=>s.pos?'rgba(30,203,150,0.75)':'rgba(240,96,122,0.75)');
  const chartId='secChart'+Date.now();
  const mac=(macro||[]).slice(0,3).map((p,i)=>
    `<div class="macro-row"><div class="macro-tag">KEY ${i+1}</div><div class="macro-desc">${p}</div></div>`
  ).join('');
  setTimeout(()=>{
    const el=document.getElementById(chartId);
    if(!el||!window.Chart) return;
    new Chart(el,{type:'bar',data:{labels,datasets:[{data:values,backgroundColor:colors,borderRadius:4,borderSkipped:false}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>(c.raw>0?'+':'')+c.raw.toFixed(2)+'%'}}},
        scales:{x:{grid:{color:'rgba(201,168,76,0.06)',drawBorder:false},ticks:{color:'#50596b',font:{family:'JetBrains Mono',size:9},callback:v=>(v>0?'+':'')+v+'%'},border:{display:false}},
          y:{grid:{display:false},ticks:{color:'#8a95aa',font:{family:'Plus Jakarta Sans',size:11}},border:{display:false}}}}});
  },80);
  return `<div class="sec-wrap">
    <div class="sec-chart-wrap">
      <div class="sec-col-lbl">Sector Performance</div>
      <div style="position:relative;height:${Math.max(160,sorted.length*32)}px"><canvas id="${chartId}"></canvas></div>
    </div>
    <div>
      <div class="sec-col-lbl">Macro Highlights</div>
      ${mac||'<p style="color:var(--silver2);font-size:12px">See full report.</p>'}
    </div>
  </div>`;
}

function renderCalendar(earnings){
  const rows=(earnings||[]).map(r=>`<div class="cal-row">
    <div class="cal-tk">${r.ticker??''}</div>
    <div class="cal-name">${r.company??''}</div>
    <div class="cal-date">${r.date??'N/A'}</div></div>`)
    .join('')||'<p style="color:var(--silver2);font-size:12px">No earnings dates available.</p>';
  return `<div class="cal-lbl">Upcoming Earnings</div>${rows}`;
}

function renderSTW(stw){
  if(!stw?.length)return '<p style="color:var(--silver2);font-size:12px">Stocks to watch unavailable.</p>';
  return `<div class="stw-list">${stw.map(s=>{
    const rc=s.rating==='BUY'?'bgg':s.rating==='SELL'?'bgr':'bga';
    const cc=s.rating==='BUY'?'buy':s.rating==='SELL'?'sell':'hold';
    return `<div class="stw-card ${cc}">
      <div class="stw-left">
        <div class="stw-ticker">${s.ticker??'—'}</div>
        <div class="stw-price">${s.price??''}</div>
        <span class="badge ${rc}" style="display:inline-block;margin-top:8px">${s.rating??'—'}</span>
        <div class="stw-hz">${(s.horizon??'').replace('_',' ')}</div>
      </div>
      <div class="stw-body">
        <div class="stw-name">${s.name??s.ticker??'—'}</div>
        <div class="stw-reason">${s.reason??''}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderMarketTrends(mt){
  if(!mt||typeof mt==='string')return renderRaw(mt);
  const upItems=(mt.upside_risks||[]).map(r=>
    `<div class="trend-item"><div class="trend-icon" style="color:var(--green)">▲</div><div class="trend-text">${r}</div></div>`
  ).join('');
  const dnItems=(mt.downside_risks||[]).map(r=>
    `<div class="trend-item"><div class="trend-icon" style="color:var(--red)">▼</div><div class="trend-text">${r}</div></div>`
  ).join('');
  const commentary=mt.commentary?`<div class="pulse-box" style="margin-bottom:18px">${mt.commentary}</div>`:'';
  return `${commentary}<div class="trends-grid">
    <div>
      <div class="trend-col-lbl"><div class="trend-dot" style="background:var(--green)"></div>Upside Risks</div>
      ${upItems||'<p style="color:var(--silver2);font-size:12px">—</p>'}
    </div>
    <div>
      <div class="trend-col-lbl"><div class="trend-dot" style="background:var(--red)"></div>Downside Risks</div>
      ${dnItems||'<p style="color:var(--silver2);font-size:12px">—</p>'}
    </div>
  </div>`;
}

/* ── PORTFOLIO ALLOCATION with donut chart ── */
function renderPortfolioAlloc(pa){
  if(!pa||typeof pa==='string')return renderRaw(pa);
  const buckets=pa.buckets||[];
  const rationale=pa.rationale?`<div class="alloc-rationale">${pa.rationale}</div>`:'';
  const donutId='donut'+Date.now();
  const legendHtml=buckets.map((b,i)=>`
    <div class="alloc-leg-row">
      <div class="alloc-leg-dot" style="background:${DONUT_COLORS[i%DONUT_COLORS.length]}"></div>
      <div class="alloc-leg-name">${b.bucket??'—'}</div>
      <div class="alloc-leg-pct">${b.allocation_pct??0}%</div>
    </div>`).join('');
  setTimeout(()=>{
    const el=document.getElementById(donutId);
    if(!el||!window.Chart) return;
    new Chart(el,{type:'doughnut',
      data:{labels:buckets.map(b=>b.bucket),datasets:[{data:buckets.map(b=>parseFloat(b.allocation_pct)||0),
        backgroundColor:DONUT_COLORS,borderWidth:0,hoverBorderWidth:2,hoverBorderColor:'rgba(255,255,255,0.3)'}]},
      options:{responsive:false,cutout:'72%',plugins:{legend:{display:false},
        tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw}%`}}}}});
  },80);
  const head=['Bucket','Alloc','Purpose'].map(h=>`<th>${h}</th>`).join('');
  const body=buckets.map(b=>`<tr>
    <td><div class="alloc-bucket">${b.bucket??'—'}</div></td>
    <td class="alloc-pct">${b.allocation_pct??0}%</td>
    <td>${b.purpose??''}</td>
  </tr>`).join('');
  const trigger=pa.rebalance_trigger?`<div class="alloc-trigger"><strong>Rebalance Trigger:</strong> ${pa.rebalance_trigger}</div>`:'';
  return `${rationale}
    <div class="alloc-top">
      <div class="alloc-donut-wrap"><canvas id="${donutId}" width="140" height="140"></canvas></div>
      <div class="alloc-legend">${legendHtml}</div>
    </div>
    <table class="alloc-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>
    ${trigger}`;
}

function renderDashboard(d,meta){
  const label=meta?.date
    ?new Date(meta.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}).toUpperCase()
    :'LATEST';
  const spotBadges=(d.spotlights||[]).map(s=>`${s.ticker} ${rBadge(s.rating)}`).join(' ')||'MU';
  document.getElementById('mainArea').innerHTML=`
    <div id="s1"  class="section card"><div class="ch"><div class="ct"><div class="ci">◈</div>Market Summary</div><div class="chr"><span class="badge bg2">${label}</span></div></div><div class="cb">${renderMkt(d.mkt_data,d.pulse)}</div></div>
    <div id="s1b" class="section card"><div class="ch"><div class="ct"><div class="ci">⚡</div>Early Warning</div><span class="badge bga">SIGNALS</span></div><div class="cb">${renderRaw(d.early_warning)}</div></div>
    <div id="s2"  class="section card"><div class="ch"><div class="ct"><div class="ci">◎</div>Stock Spotlights</div><div class="chr">${spotBadges}</div></div><div class="cb">${renderRaw(d.spotlights_html)}</div></div>
    <div id="s3"  class="section card"><div class="ch"><div class="ct"><div class="ci">◆</div>AI &amp; Mag 7 Watchlist</div><span class="badge bgb">${(d.ai_rows||[]).length} STOCKS + BETA</span></div><div class="cb">${renderWatch(d.ai_rows)}</div></div>
    <div id="s4"  class="section card"><div class="ch"><div class="ct"><div class="ci">▣</div>Why Markets Moved</div></div><div class="cb"><div class="prose">${(d.why_paras||[]).map(p=>`<p>${p}</p>`).join('')||'<p>See full report.</p>'}</div></div></div>
    <div id="s5"  class="section card"><div class="ch"><div class="ct"><div class="ci">⟳</div>Sector Rotation &amp; Macro</div></div><div class="cb">${renderSectors(d.winners,d.losers,d.macro)}</div></div>
    <div id="s6"  class="section card"><div class="ch"><div class="ct"><div class="ci">◷</div>Earnings Calendar</div></div><div class="cb">${renderCalendar(d.earnings)}</div></div>
    <div id="s6b" class="section card"><div class="ch"><div class="ct"><div class="ci">◉</div>Opportunity Radar</div><span class="badge bgb">6B</span></div><div class="cb">${renderRaw(d.opportunity_radar)}</div></div>
    <div id="s7"  class="section card"><div class="ch"><div class="ct"><div class="ci">◐</div>Stocks to Watch</div><span class="badge bg2">${(d.stw||[]).length} PICKS</span></div><div class="cb">${renderSTW(d.stw)}</div></div>
    <div id="s8"  class="section card"><div class="ch"><div class="ct"><div class="ci">◈</div>Market Trends</div><span class="badge bgp">SIGNALS</span></div><div class="cb">${renderMarketTrends(d.market_trends)}</div></div>
    <div id="s9"  class="section card"><div class="ch"><div class="ct"><div class="ci">◎</div>Portfolio Allocation</div><span class="badge bg2">5–8 YR HORIZON</span></div><div class="cb">${renderPortfolioAlloc(d.portfolio_allocation)}</div></div>`;
}

const mainEl=document.getElementById('mainArea');
function showLoading(){mainEl.innerHTML=`<div class="card"><div class="cb"><div class="state"><div class="spin"></div><div class="st">Fetching intelligence…</div><div class="ss">Loading latest market report</div></div></div></div>`;}
function showError(msg){mainEl.innerHTML=`<div class="card"><div class="cb"><div class="state"><div style="font-size:44px;opacity:.18;font-family:'Instrument Serif',serif">◈</div><div class="st">No report yet</div><div class="ss">${msg}</div></div></div></div>`;}
async function loadJSON(url){try{const r=await fetch(url+'?t='+Date.now());return r.ok?r.json():null;}catch{return null;}}
async function loadIndex(){return(await loadJSON('/reports/index.json'))||[];}

async function loadReport(dateStr){
  const data=await loadJSON(`/reports/report_${dateStr}.json`)||await loadJSON('/reports/latest.json');
  if(data&&(data.mkt_data?.length||data.ai_rows?.length))renderDashboard(data,{date:dateStr});
  else showError(`Report data missing for ${dateStr}.<br>Cron runs <strong style="color:var(--gold)">06:00 SGT</strong> weekdays.`);
}
async function loadByDate(d){showLoading();await loadReport(d);highlightHist(d);}
async function init(){
  showLoading();
  const index=await loadIndex();
  renderHistory(index,index[0]?.date??null);
  if(!index.length){showError(`No reports yet.<br>Cron runs weekdays <strong style="color:var(--gold)">06:00 SGT</strong>.`);return;}
  await loadReport(index[0].date);
}
function renderHistory(index,active){
  const list=document.getElementById('histList');
  if(!index?.length){list.innerHTML='<div style="padding:6px 4px;font-family:\'JetBrains Mono\',monospace;font-size:9px;color:var(--silver2)">No reports yet</div>';return;}
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-5); cutoff.setHours(0,0,0,0);
  const recent=index.filter(r=>new Date(r.date+'T12:00:00')>=cutoff);
  const older=index.filter(r=>new Date(r.date+'T12:00:00')<cutoff);
  const mkItem=r=>{
    const day=new Date(r.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'});
    return `<div class="hi${r.date===active?' active':''}" onclick="loadByDate('${r.date}')">
      <div class="hdot"></div>
      <div><div class="hdate">${r.date}</div><div class="hmeta">${day} · After Close</div></div>
    </div>`;
  };
  const olderHtml=older.length?`
    <div id="olderToggle" onclick="toggleOlder()" style="display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;color:var(--silver2);font-size:9px;letter-spacing:.1em;user-select:none;margin-top:4px">
      <span id="olderArrow">▶</span> OLDER (${older.length})
    </div>
    <div id="olderList" style="display:none">${older.map(mkItem).join('')}</div>`:'';
  list.innerHTML=recent.map(mkItem).join('')+olderHtml;
}
function toggleOlder(){
  const el=document.getElementById('olderList');
  const arrow=document.getElementById('olderArrow');
  const visible=el.style.display!=='none';
  el.style.display=visible?'none':'block';
  arrow.textContent=visible?'▶':'▼';
}
function highlightHist(d){
  document.querySelectorAll('.hi').forEach(el=>el.classList.toggle('active',el.querySelector('.hdate')?.textContent===d));
}

init();
fetchTickers();
setInterval(fetchTickers,5*60*1000);
</script>
